name: Build and Publish Binary

on:
  workflow_call:
    inputs:
      environment:
        description: 'Deployment environment (dev or prod)'
        required: true
        type: string
      tag_prefix:
        description: 'Binary asset tag prefix (e.g. "dev" or "v")'
        required: true
        type: string

jobs:
  build-and-publish-binary:
    name: Go build & release
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: false

      - name: Derive asset name
        id: asset
        run: |
          SHA="${{ github.sha }}"
          SHORT_SHA="${SHA:0:7}"
          PREFIX="${{ inputs.tag_prefix }}"

          if [ "${{ inputs.environment }}" = "prod" ]; then
            echo "name=api-${PREFIX}${SHORT_SHA}-linux-amd64" >> "$GITHUB_OUTPUT"
            echo "tag=${PREFIX}${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          else
            echo "name=api-${PREFIX}-${SHORT_SHA}-linux-amd64" >> "$GITHUB_OUTPUT"
            echo "tag=${PREFIX}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build binary
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o ${{ steps.asset.outputs.name }} ./cmd/api

      - name: Upload to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.asset.outputs.tag }}
          name: ${{ steps.asset.outputs.tag }}
          prerelease: ${{ inputs.environment != 'prod' }}
          files: ${{ steps.asset.outputs.name }}
          make_latest: ${{ inputs.environment == 'prod' }}
          fail_on_unmatched_files: false
