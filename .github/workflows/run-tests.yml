name: Run Tests

on:
  workflow_call:

jobs:
  test:
    name: go test
    runs-on: ubuntu-latest

    # services:                          # Uncomment when DB integration tests are added
    #   postgres:
    #     image: postgres:18-alpine
    #     env:
    #       POSTGRES_USER: postgres
    #       POSTGRES_PASSWORD: postgres
    #       POSTGRES_DB: webinar_test
    #     ports:
    #       - 5432:5432
    #     options: >-
    #       --health-cmd pg_isready
    #       --health-interval 5s
    #       --health-timeout 5s
    #       --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Download modules
        run: go mod download

      - name: Run tests
        run: go test -race -count=1 ./...
