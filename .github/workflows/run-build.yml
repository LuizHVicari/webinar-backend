name: Run Build

on:
  workflow_call:

jobs:
  build:
    name: go build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Download modules
        run: go mod download

      - name: Build
        run: go build ./...
