name: CI — Pull Request

on:
  pull_request:
    branches:
      - dev
      - main

jobs:
  lint:
    name: Lint
    uses: ./.github/workflows/run-lint.yml

  vet:
    name: Vet
    uses: ./.github/workflows/run-vet.yml

  build:
    name: Build
    uses: ./.github/workflows/run-build.yml

  test:
    name: Tests
    needs: [lint, vet, build]
    uses: ./.github/workflows/run-tests.yml
