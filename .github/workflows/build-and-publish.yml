name: Build and Publish

on:
  workflow_call:
    inputs:
      environment:
        description: 'Deployment environment (dev or prod)'
        required: true
        type: string
      tag_prefix:
        description: 'Image tag prefix (e.g. "dev" or "v")'
        required: true
        type: string

jobs:
  build-and-publish:
    name: Docker build & push
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Derive image tags
        id: tags
        run: |
          SHA="${{ github.sha }}"
          SHORT_SHA="${SHA:0:7}"
          PREFIX="${{ inputs.tag_prefix }}"
          IMAGE="ghcr.io/luizhvicari/webinar-backend"

          if [ "${{ inputs.environment }}" = "prod" ]; then
            echo "tags=${IMAGE}:${PREFIX}${SHORT_SHA},${IMAGE}:latest" >> "$GITHUB_OUTPUT"
          else
            echo "tags=${IMAGE}:${PREFIX}-${SHORT_SHA},${IMAGE}:${PREFIX}-latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
