services:
  postgres:
    image: postgres:18-alpine
    profiles: [infra, full]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-webinar}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    profiles: [infra, full]
    ports:
      - "${REDIS_PORT:-6379}:6379"

  kratos-migrate:
    image: oryd/kratos:v25.4.0
    profiles: [infra, full]
    depends_on:
      postgres:
        condition: service_healthy
    command: migrate sql -e --yes
    environment:
      DSN: postgres://kratos:kratos@postgres:5432/webinar_kratos?sslmode=disable
    restart: on-failure

  kratos:
    image: oryd/kratos:v25.4.0
    profiles: [infra, full]
    depends_on:
      kratos-migrate:
        condition: service_completed_successfully
    ports:
      - "${KRATOS_PUBLIC_PORT:-4433}:4433"
      - "${KRATOS_ADMIN_PORT:-4434}:4434"
    command: serve -c /etc/config/kratos/kratos.yml --dev --watch-courier
    volumes:
      - ./config/kratos:/etc/config/kratos
    environment:
      DSN: postgres://kratos:kratos@postgres:5432/webinar_kratos?sslmode=disable

  keto-migrate:
    image: oryd/keto:v25.4.0
    profiles: [infra, full]
    depends_on:
      postgres:
        condition: service_healthy
    command: migrate up -y -c /etc/config/keto/keto.yml
    volumes:
      - ./config/keto:/etc/config/keto
    environment:
      DSN: postgres://keto:keto@postgres:5432/webinar_keto?sslmode=disable
    restart: on-failure

  keto:
    image: oryd/keto:v25.4.0
    profiles: [infra, full]
    depends_on:
      keto-migrate:
        condition: service_completed_successfully
    ports:
      - "${KETO_READ_PORT:-4466}:4466"
      - "${KETO_WRITE_PORT:-4467}:4467"
    command: serve -c /etc/config/keto/keto.yml
    volumes:
      - ./config/keto:/etc/config/keto
    environment:
      DSN: postgres://keto:keto@postgres:5432/webinar_keto?sslmode=disable

  api:
    build: .
    profiles: [app, full]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "${PORT:-8080}:8080"
    env_file: .env
    environment:
      PORT: ${PORT:-8080}
      DATABASE_URL: ${DATABASE_URL:-postgres://postgres:postgres@postgres:5432/webinar?sslmode=disable}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      KRATOS_PUBLIC_URL: ${KRATOS_PUBLIC_URL:-http://kratos:4433}
      KRATOS_ADMIN_URL: ${KRATOS_ADMIN_URL:-http://kratos:4434}
      KETO_READ_URL: ${KETO_READ_URL:-http://keto:4466}
      KETO_WRITE_URL: ${KETO_WRITE_URL:-http://keto:4467}

volumes:
  postgres_data:
